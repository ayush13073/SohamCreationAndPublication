<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry - Soham Publication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .summary-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-left: 4px solid #10b981;
        }
        .bill-line {
            border-bottom: 1px dashed #cbd5e1;
            padding: 0.5rem 0;
        }
        .total-line {
            border-top: 2px solid #1e293b;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            font-weight: bold;
        }
        .price-capped { color: #eab308; font-size: 0.75rem; }
    </style>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-md sticky top-0 z-10">
        <div class="container mx-auto px-4 py-3 flex flex-wrap justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-indigo-600">Soham Publication</a>
            <div class="flex space-x-4 overflow-x-auto">
                <a href="index.html" class="text-gray-700 hover:text-indigo-600 px-2 py-1">Home</a>
                <a href="records.html" class="text-gray-700 hover:text-indigo-600 px-2 py-1">Records</a>
                <a href="report.html" class="text-gray-700 hover:text-indigo-600 px-2 py-1">Report</a>
                <div id="guest-links">
                    <a href="login.html" class="text-gray-700 hover:text-indigo-600 px-2 py-1">Login</a>
                    <a href="register.html" class="text-gray-700 hover:text-indigo-600 px-2 py-1">Register</a>
                </div>
                <div id="auth-links" class="hidden">
                    <a href="data-entry.html" id="data-entry-nav" class="text-gray-700 hover:text-indigo-600 px-2 py-1">Data Entry</a>
                    <button id="logout-btn" class="text-gray-700 hover:text-indigo-600 px-2 py-1">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="grid lg:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-2 bg-white rounded-lg shadow p-6">
                <h2 class="text-2xl font-bold mb-6">📝 New Sale Entry</h2>
                <form id="sale-form">
                    <!-- Book Selection -->
                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Select Book *</label>
                        <select id="bookSelect" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-indigo-400" required>
                            <option value="">-- Select a Book --</option>
                        </select>
                    </div>

                    <!-- Quantity & Price -->
                    <div class="grid md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Quantity *</label>
                            <input type="number" id="quantity" min="1" value="1" class="w-full px-3 py-2 border rounded" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Selling Price (₹)</label>
                            <input type="number" id="sellingPrice" step="any" class="w-full px-3 py-2 border rounded" placeholder="Leave blank for MRP">
                            <p id="priceWarning" class="text-xs text-yellow-600 hidden mt-1">Price exceeds MRP! Using MRP instead.</p>
                        </div>
                    </div>

                    <!-- Age Group -->
                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Age Group of Buyer *</label>
                        <select id="ageGroup" class="w-full px-3 py-2 border rounded" required>
                            <option value="0-12">0-12 years</option>
                            <option value="13-20">13-20 years</option>
                            <option value="21-28" selected>21-28 years</option>
                            <option value="29-40">29-40 years</option>
                            <option value="41-60">41-60 years</option>
                            <option value="60+">60+ years</option>
                        </select>
                    </div>

                    <!-- Date & Time -->
                    <div class="grid md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Sale Date *</label>
                            <input type="date" id="saleDate" class="w-full px-3 py-2 border rounded" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Sale Time *</label>
                            <input type="time" id="saleTime" class="w-full px-3 py-2 border rounded" required>
                        </div>
                    </div>

                    <!-- Discount -->
                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Discount</label>
                        <div class="flex space-x-4 mb-2">
                            <label class="inline-flex items-center">
                                <input type="radio" name="discountType" value="percent" checked> <span class="ml-2">%</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="radio" name="discountType" value="amount"> <span class="ml-2">Amount (₹)</span>
                            </label>
                        </div>
                        <input type="number" id="discountValue" step="any" value="0" class="w-full px-3 py-2 border rounded" placeholder="0">
                    </div>

                    <!-- Coupon -->
                    <div class="mb-6">
                        <label class="block text-gray-700 font-medium mb-2">Coupon Code</label>
                        <input type="text" id="couponCode" class="w-full px-3 py-2 border rounded" placeholder="SAVE100">
                        <p class="text-xs text-gray-500 mt-1">Enter "SAVE100" to get ₹100 off (cannot go below ₹0).</p>
                    </div>

                    <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700 transition">💾 Record Sale</button>
                </form>
            </div>

            <!-- Interactive Bill Summary -->
            <div class="bg-white rounded-lg shadow p-6 summary-card">
                <h3 class="text-xl font-bold mb-4">🧾 Bill Summary</h3>
                <div id="summaryContent">
                    <p class="text-gray-500">Select a book to see details...</p>
                </div>
                <div id="finalTotal" class="mt-4 text-2xl font-bold text-green-700 text-right"></div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-800 text-white py-4 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2025 Soham Creation & Publication</p>
        </div>
    </footer>

    <script type="module" src="./js/data-entry.js"></script>
</body>
</html>
